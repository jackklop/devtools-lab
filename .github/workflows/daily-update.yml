- name: Commit and push changes
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    TASK=$(python -c "import json; print(json.load(open('project_state.json'))['tasks'][json.load(open('project_state.json'))['task_index']-1])")

    git add .
    git diff --cached --quiet || git commit -m "$TASK"
    git push
